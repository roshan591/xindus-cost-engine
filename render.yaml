services:
  - type: web
    name: xindus-cost-engine
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeploy: false  # deploys are triggered via GitHub Actions after CI passes

    buildCommand: npm ci --include=dev && npx drizzle-kit push --force && npm run build
    startCommand: npm start

    healthCheckPath: /

    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.9.0

      # Set these in the Render dashboard (Environment → Secret Files / Env Vars)
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
