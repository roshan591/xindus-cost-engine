name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── CI: runs on every push and PR ────────────────────────────────────────────
  ci:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── CD: deploy to Render only when CI passes on main ─────────────────────────
  deploy:
    name: Deploy to Render
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        run: |
          curl --fail --silent --show-error -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # RENDER_DEPLOY_HOOK_URL → GitHub repo → Settings → Secrets → Actions
        # Get the URL from: Render dashboard → your service → Settings → Deploy Hook
